function useFadeIn() {
    const ref = useRef(null);
    useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([entry]) => {
            if (entry.isIntersecting) { el.classList.add('visible'); obs.disconnect(); }
        }, { threshold: 0.1 });
        obs.observe(el);
        return () => obs.disconnect();
    }, []);
    return ref;
}

function FadeIn({ children, delay = 0, className = "" }) {
    const ref = useFadeIn();
    return (
        <div ref={ref} className={`fade-in ${className}`} style={{ transitionDelay: `${delay}ms` }}>
            {children}
        </div>
    );
}

function Stats() {
    return (
        <section className="bg-[#0f172a] pb-16">
            <div className="max-w-6xl mx-auto px-6">
                <FadeIn>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        {PROFILE.stats.map((s, i) => (
                            <div key={i} className="stat-card rounded-2xl p-6 text-center text-white">
                                <div className="text-3xl md:text-4xl font-black text-blue-400 mb-1">{s.value}</div>
                                <div className="text-xs font-bold uppercase tracking-widest text-white/70 mb-0.5">{s.label}</div>
                                <div className="text-[10px] text-white/40">{s.sub}</div>
                            </div>
                        ))}
                    </div>
                </FadeIn>
            </div>
        </section>
    );
}

function About() {
    const bold = PROFILE.dna.description;
    return (
        <section id="about" className="py-24 bg-white">
            <div className="max-w-4xl mx-auto px-6 text-center">
                <FadeIn>
                    <p className="text-xl md:text-3xl font-bold text-slate-800 leading-tight mb-16">
                        {bold.map((part, i) => i % 2 === 0
                            ? <span key={i}>{part}</span>
                            : <span key={i} className="text-blue-600">{part}</span>
                        )}
                    </p>
                </FadeIn>
                <div className="grid md:grid-cols-2 gap-6">
                    <FadeIn delay={100}>
                        <div className="bg-slate-50 p-8 rounded-3xl text-left border border-slate-100 flex gap-5 h-full">
                            <div className="text-3xl flex-shrink-0">⚡</div>
                            <div>
                                <h4 className="font-black uppercase text-[10px] tracking-widest text-slate-400 mb-2">My Superpower</h4>
                                <p className="text-base font-bold text-slate-800 leading-snug">{PROFILE.dna.superpower}</p>
                            </div>
                        </div>
                    </FadeIn>
                    <FadeIn delay={200}>
                        <div className="bg-slate-50 p-8 rounded-3xl text-left border border-slate-100 flex gap-5 h-full">

                            <div>
                                <h4 className="font-black uppercase text-[10px] tracking-widest text-slate-400 mb-2">My Approach</h4>

                                    </svg>
                                </div>
                                <h3 className="text-base font-black uppercase tracking-tight text-slate-900 mb-5">{exp.category}</h3>
                                <ul className="space-y-3 flex-1">
                                    {exp.items.map((item, j) => (
                                        <li key={j} className="flex gap-3 items-start">
                                            <span className="text-blue-500 font-black mt-0.5">·</span>
                                            <div>

                                                <div className="text-xs text-slate-400">{item.sub}</div>

                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </FadeIn>
                    ))}
                </div>
            </div>
        </section>
    );
}

function Impact() {
    return (
        <section id="impact" className="py-24 bg-white">
            <div className="max-w-6xl mx-auto px-6">
                <FadeIn>
                    <div className="bg-[#0f172a] rounded-[2.5rem] p-8 md:p-14 text-white relative overflow-hidden">

                        <div className="relative z-10">
                            <div className="flex flex-wrap items-center gap-3 mb-8">

                                        <p className="text-sm font-bold text-white leading-snug">{c.text}</p>
                                    </div>
                                ))}
                            </div>
                            <div className="bg-blue-600/15 border border-blue-500/20 rounded-2xl px-6 py-4 inline-block">
                                <p className="text-sm text-blue-200 italic">"{PROFILE.flagship.quote}"</p>
                            </div>
                        </div>
                    </div>
                </FadeIn>
            </div>
        </section>
    );
}

                        <div className="grid grid-cols-5 gap-4">
                            {PROFILE.timeline.map((item, i) => (
                                <div key={i} className="relative flex flex-col items-center text-center pt-0">
                                    {/* dot */}
                                    <div className={`w-4 h-4 rounded-full border-2 border-blue-600 mb-4 z-10 ${i === 0 ? 'bg-blue-600' : 'bg-white'}`}></div>

                                    {/* card */}
                                    <div className={`w-full rounded-2xl p-4 border ${i === 0 ? 'border-blue-200 bg-blue-50' : 'border-slate-100 bg-slate-50'}`}>
                                        <span className="text-[9px] font-black uppercase tracking-widest text-blue-500 block mb-1">{item.period}</span>
                                        {item.tag && (
                                            <span className={`inline-block text-[8px] font-black uppercase px-2 py-0.5 rounded-full mb-2 ${i === 0 ? 'bg-blue-600 text-white' : 'bg-slate-200 text-slate-500'}`}>
                                                {item.tag}
                                            </span>
                                        )}
                                        <h3 className="text-xs font-black uppercase tracking-tight text-slate-900 leading-snug">{item.title}</h3>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </FadeIn>
            </div>
        </section>
    );
}

function Values() {
    return (
        <section className="py-24 bg-slate-50">

                <FadeIn>
                    <div className="text-center mb-16">
                        <p className="text-[10px] font-black uppercase tracking-widest text-blue-500 mb-3">What drives me</p>

                </FadeIn>
                <div className="grid md:grid-cols-3 gap-8">
                    {PROFILE.values.map((v, i) => (

                                <p className="text-slate-500 text-sm font-medium leading-relaxed">{v.text}</p>
                            </div>
                        </FadeIn>
                    ))}
                </div>
            </div>
        </section>
    );
}

function Contact() {
    return (
        <section id="contact" className="py-32 bg-[#0f172a] text-white text-center relative overflow-hidden">
            <div className="absolute inset-0">

            <div className="max-w-3xl mx-auto px-6 relative z-10 space-y-8">

                        <a href={`mailto:${PROFILE.email}`}

                            Email Me
                        </a>
                        <a href={`https://${PROFILE.linkedin}`} target="_blank" rel="noopener noreferrer"
                           className="border border-white/20 hover:border-blue-400 text-white hover:text-blue-300 px-8 py-4 rounded-full font-black uppercase tracking-widest text-sm transition-all">
                            LinkedIn ↗
                        </a>
                    </div>
                </FadeIn>
                <FadeIn delay={250}>
                    <p className="text-blue-400 font-black text-xl italic pt-8">"{PROFILE.closingQuote}"</p>
                </FadeIn>
                <FadeIn delay={350}>
                    <div className="mt-8 border-t border-white/10 pt-10">

                                <div key={i} className="bg-white/5 border border-white/10 rounded-2xl p-5 text-left">
                                    <p className="font-black text-white text-sm mb-1">{ref.name}</p>
                                    <p className="text-blue-300 text-xs font-bold mb-2">{ref.role}</p>
                                    <a href={`mailto:${ref.email}`} className="text-slate-400 text-xs hover:text-blue-300 transition-colors">{ref.email}</a>

function App() {
    const [scrolled, setScrolled] = useState(false);
    useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 60);
        window.addEventListener('scroll', fn);
        return () => window.removeEventListener('scroll', fn);
    }, []);

    return (
        <>
            <Nav scrolled={scrolled} />
            <Hero />
            <Stats />
            <About />
            <Expertise />
            <Impact />
            <Values />
            <Timeline />
            <Contact />
        </>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
